services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: executivefounders
      POSTGRES_PASSWORD: executivefounders
      POSTGRES_DB: executivefounders
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executivefounders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
