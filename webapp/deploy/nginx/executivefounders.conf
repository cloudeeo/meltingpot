server {
    listen 80;
    listen [::]:80;
    server_name executivefounders.com www.executivefounders.com;
    return 301 https://executivefounders.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.executivefounders.com;

    ssl_certificate /etc/letsencrypt/live/executivefounders.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/executivefounders.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://executivefounders.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name executivefounders.com;
    http2 on;

    ssl_certificate /etc/letsencrypt/live/executivefounders.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/executivefounders.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 4M;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # Long-term cache for hashed static assets emitted by Astro.
    location ^~ /_astro/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
