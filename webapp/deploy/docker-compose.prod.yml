services:
  postgres:
    image: postgres:16-alpine
    container_name: executivefounders-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: executivefounders
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: executivefounders
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executivefounders"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    image: executivefounders-app:latest
    container_name: executivefounders-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      PUBLIC_SITE_URL: https://executivefounders.com
      # DATABASE_URL is set via .env.production to avoid embedding credentials
      # in this committed file.
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-info@executivefounders.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Executive Founders}
      CONTACT_NOTIFY_TO: ${CONTACT_NOTIFY_TO:-info@executivefounders.com}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  cron:
    image: alpine:3.19
    container_name: executivefounders-cron
    restart: unless-stopped
    entrypoint: /bin/sh
    command: >
      -c "
        apk add --no-cache postgresql-client &&
        echo '0 2 * * * /scripts/backup-db.sh >> /var/log/cron.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./cron:/scripts:ro
      - db_backups:/backups
    depends_on:
      - postgres
    networks:
      - internal

volumes:
  postgres_data:
  db_backups:

networks:
  internal:
    name: executivefounders_internal
